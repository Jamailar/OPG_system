name: Docker Release

on:
  push:
    tags:
      - 'opg-system/v*'
      - 'opg-gateway/v*'
      - 'opg-web/v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to publish, for example opg-gateway/v1.0.119'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  prepare:
    name: Prepare image matrix
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      matrix: ${{ steps.release.outputs.matrix }}
      release_title: ${{ steps.release.outputs.release_title }}
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail

          tag="${RELEASE_TAG}"
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image_base="ghcr.io/${owner}/opg-system"

          case "${tag}" in
            opg-system/v*)
              version="${tag#opg-system/v}"
              release_title="OPG System v${version}"
              matrix="$(jq -cn \
                --arg image_base "${image_base}" \
                '{include:[
                  {name:"opg-system", image:$image_base, target:"opg-all"},
                  {name:"opg-system-gateway", image:($image_base + "-gateway"), target:"gateway-runtime"},
                  {name:"opg-system-web", image:($image_base + "-web"), target:"web-runtime"}
                ]}')"
              ;;
            opg-gateway/v*)
              version="${tag#opg-gateway/v}"
              release_title="OPG Gateway v${version}"
              matrix="$(jq -cn \
                --arg image_base "${image_base}" \
                '{include:[{name:"opg-system-gateway", image:($image_base + "-gateway"), target:"gateway-runtime"}]}')"
              ;;
            opg-web/v*)
              version="${tag#opg-web/v}"
              release_title="OPG Web v${version}"
              matrix="$(jq -cn \
                --arg image_base "${image_base}" \
                '{include:[{name:"opg-system-web", image:($image_base + "-web"), target:"web-runtime"}]}')"
              ;;
            *)
              echo "Unsupported release tag: ${tag}" >&2
              exit 1
              ;;
          esac

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "release_title=${release_title}" >> "${GITHUB_OUTPUT}"
          {
            echo 'matrix<<EOF'
            echo "${matrix}"
            echo EOF
          } >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ matrix.name == 'opg-system' }}
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push GHCR image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: |
            ${{ matrix.image }}:${{ needs.prepare.outputs.version }}
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Docker Hub image
        if: ${{ matrix.name == 'opg-system' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: |
            docker.io/${{ vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}/opg-system:${{ needs.prepare.outputs.version }}
            docker.io/${{ vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}/opg-system:latest
            docker.io/${{ vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}/opg-system:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
          cache-from: type=gha

      - name: Export Docker image archive
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          push: false
          tags: ${{ matrix.image }}:${{ needs.prepare.outputs.version }}
          outputs: type=docker,dest=/tmp/${{ matrix.name }}-${{ needs.prepare.outputs.version }}.tar
          cache-from: type=gha

      - name: Compress image archive
        shell: bash
        run: |
          set -euo pipefail
          archive="/tmp/${{ matrix.name }}-${{ needs.prepare.outputs.version }}.tar"
          gzip -9 "${archive}"
          sha256sum "${archive}.gz" > "${archive}.gz.sha256"

      - name: Upload image archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-${{ needs.prepare.outputs.version }}-image
          path: |
            /tmp/${{ matrix.name }}-${{ needs.prepare.outputs.version }}.tar.gz
            /tmp/${{ matrix.name }}-${{ needs.prepare.outputs.version }}.tar.gz.sha256
          if-no-files-found: error

  dockerhub-description:
    name: Sync Docker Hub README
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    if: ${{ startsWith(needs.prepare.outputs.tag, 'opg-system/v') }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Update Docker Hub repository description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}/opg-system
          short-description: OPG System app backend control plane for one-person companies.
          readme-filepath: README.md
          enable-url-completion: true

  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0

      - name: Download image archive artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: '*-image'
          merge-multiple: true

      - name: Generate release notes
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_TITLE: ${{ needs.prepare.outputs.release_title }}
        run: |
          set -euo pipefail

          module="${RELEASE_TAG%%/v*}"
          prefix="${module}/v"
          previous_tag="$(git tag --list "${prefix}*" --sort=-v:refname | grep -vx "${RELEASE_TAG}" | head -n 1 || true)"

          if [[ -n "${previous_tag}" ]]; then
            range="${previous_tag}..${RELEASE_TAG}"
            compare_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/compare/${previous_tag}...${RELEASE_TAG}"
          else
            range="${RELEASE_TAG}"
            compare_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commits/${RELEASE_TAG}"
          fi

          {
            echo "# ${RELEASE_TITLE}"
            echo
            echo "## Changelog"
            if [[ -n "${previous_tag}" ]]; then
              echo
              echo "Changes since \`${previous_tag}\`:"
            fi
            echo
            git log --no-merges --pretty=format:'- %s (%h)' "${range}" \
              | sed '/^- chore([^)]*): release /d' \
              | sed '/^- chore(release): release /d' \
              > /tmp/release-commits.md
            if [[ -s /tmp/release-commits.md ]]; then
              cat /tmp/release-commits.md
            else
              echo "- Release packaging and image publication."
            fi
            echo
            echo
            echo "## Images"
            echo
            find release-assets -maxdepth 1 -type f -name '*.tar.gz' -print | sort | while read -r archive; do
              echo "- \`$(basename "${archive}")\`"
            done
            echo
            echo "## Checksums"
            echo
            find release-assets -maxdepth 1 -type f -name '*.sha256' -print | sort | while read -r checksum; do
              echo "- \`$(basename "${checksum}")\`"
            done
            echo
            echo "## Full Changelog"
            echo
            echo "${compare_url}"
          } > release-notes.md

      - name: Create or update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.release_title }}
          make_latest: true
          body_path: release-notes.md
          files: release-assets/*
